<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark">
<meta name="supported-color-schemes" content="dark">
<title>破晓镇 · 蚀目之影</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { color-scheme: dark; }
  body {
    background-color: #1a1a2e !important; color: #e0e0e0 !important;
    font-family: -apple-system, 'Courier New', monospace; font-size: 15px;
    height: 100vh; height: 100dvh; display: flex; flex-direction: column;
    -webkit-text-size-adjust: 100%;
  }
  #header {
    background: #16213e; padding: 12px 16px; border-bottom: 1px solid #0f3460;
    text-align: center; flex-shrink: 0; position: sticky; top: 0; z-index: 50;
  }
  #header h1 { color: #e6b800; font-size: 18px; margin-bottom: 4px; }
  #header .sub { color: #888; font-size: 12px; }
  #messages {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .msg { line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; color: #e0e0e0; }
  .msg.dm { color: #e0e0e0 !important; }
  .msg.system {
    color: #e6b800 !important; font-size: 13px;
    background: #1a1a3e; border-left: 3px solid #e6b800; padding: 8px 12px;
    border-radius: 4px; cursor: pointer; max-height: 120px; overflow: hidden;
    transition: max-height 0.3s;
  }
  .msg.system.expanded { max-height: none; }
  .msg.system::after { content: ' ▼ 点击展开'; color: #666; font-size: 11px; }
  .msg.system.expanded::after { content: ' ▲ 点击收起'; }
  .msg.error { color: #ff6b6b !important; font-size: 12px; }
  .msg.player { color: #4ecdc4 !important; }
  .msg.prologue { color: #ccc !important; font-style: italic; }
  /* 快速动作建议 */
  .actions { display: flex; gap: 6px; flex-wrap: wrap; padding: 4px 0; }
  .action-btn {
    background: #0f3460; color: #aaa; border: 1px solid #333; padding: 6px 12px;
    border-radius: 16px; font-size: 13px; cursor: pointer;
  }
  .action-btn:hover { color: #e6b800; border-color: #e6b800; }
  .msg.combat-player-result {
    color: #4ecdc4 !important; font-size: 13px;
    background: #0e2a2a; border-left: 3px solid #4ecdc4; padding: 8px 12px;
    border-radius: 4px;
    animation: combatFadeIn 0.4s ease-out;
  }
  .msg.combat-monster {
    color: #ff8c42 !important; font-size: 13px;
    background: #2a1a0e; border-left: 3px solid #ff8c42; padding: 8px 12px;
    border-radius: 4px;
    animation: combatFadeIn 0.4s ease-out;
  }
  .msg.combat-narrative {
    color: #c8a96e;
    font-style: italic;
    font-size: 13px;
    padding: 4px 12px 4px 16px;
    opacity: 0.88;
  }
  .msg.combat-divider {
    color: #ff8c42 !important; font-size: 11px; text-align: center;
    padding: 4px 0; opacity: 0.6;
  }
  .msg.combat-status {
    color: #888 !important; font-size: 12px;
    background: #1a1a2e; border: 1px solid #333; padding: 6px 12px;
    border-radius: 4px; font-family: monospace;
  }
  .action-btn.combat { background: #2a1a0e; border-color: #ff8c42; color: #ff8c42; }
  .action-btn.combat:hover { color: #ffd000; border-color: #ffd000; }
  .action-btn:disabled, .action-btn[disabled] {
    opacity: 0.4; cursor: not-allowed; pointer-events: none;
  }
  .action-btn.detail { background: #1a2a3e; border-color: #445; color: #8ab; }
  .action-btn.detail:hover { color: #adf; border-color: #8ab; }
  .detail-expand {
    color: #8ab !important; font-size: 13px; font-style: italic;
    background: #0f1a2e; border-left: 2px solid #445; padding: 6px 12px;
    margin: 4px 0; border-radius: 4px; line-height: 1.5;
  }
  .msg.reconnect { color: #666 !important; font-size: 11px; }
  /* NPC 立绘 */
  .npc-portrait-bar {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #0f1a2e 0%, #1a2a4e 100%);
    border: 1px solid #e6b800; border-radius: 10px;
    padding: 8px 14px 8px 8px; margin: 6px 0;
  }
  .npc-portrait-bar img {
    width: 52px; height: 52px; border-radius: 6px;
    border: 2px solid #e6b800; image-rendering: pixelated;
    background: #0a0a1e; flex-shrink: 0;
  }
  .npc-portrait-bar .npc-speak-name {
    font-size: 14px; font-weight: bold; color: #e6b800;
  }
  .npc-portrait-bar .npc-speak-hint {
    font-size: 11px; color: #888; margin-top: 2px;
  }
  /* 战斗怪物立绘面板 */
  .combat-portraits {
    display: flex; gap: 8px; flex-wrap: wrap;
    padding: 8px 0; margin: 4px 0;
  }
  .combat-monster-card {
    background: #2a1a0e; border: 1px solid #ff8c42; border-radius: 8px;
    padding: 8px; text-align: center; min-width: 80px;
  }
  .combat-monster-card.dead { opacity: 0.3; border-color: #444; }
  .combat-monster-card img {
    width: 48px; height: 48px; image-rendering: pixelated;
    border-radius: 4px; background: #0a0a1e;
  }
  .combat-monster-card .monster-name {
    font-size: 11px; color: #ff8c42; margin-top: 4px;
  }
  .combat-monster-card .monster-hp {
    font-size: 10px; color: #888; margin-top: 2px;
  }
  .combat-monster-card .hp-bar-mini {
    width: 100%; height: 4px; background: #333; border-radius: 2px; margin-top: 3px;
  }
  .combat-monster-card .hp-bar-mini .hp-fill {
    height: 100%; border-radius: 2px; background: #f44336;
    transition: width 0.3s;
  }
  /* ─── Item notification ─── */
  .item-notification {
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #1a2e1a 0%, #1a3a1a 100%);
    border: 1px solid #4caf50; border-radius: 10px;
    padding: 10px 14px; margin: 6px 0;
    animation: combatFadeIn 0.4s ease-out;
    transition: opacity 1s;
  }
  .item-notif-icon { font-size: 24px; }
  .item-notif-text { color: #4caf50; font-size: 13px; line-height: 1.4; }

  /* ─── Trade proposal card ─── */
  @keyframes tradeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .trade-proposal-card {
    background: rgba(20, 15, 10, 0.95);
    border: 1px solid #b8860b;
    border-radius: 10px;
    padding: 16px 20px;
    margin: 12px 0;
    box-shadow: 0 0 20px rgba(184, 134, 11, 0.15), inset 0 0 30px rgba(0,0,0,0.3);
    animation: tradeSlideIn 0.3s ease-out;
  }

  .trade-proposal-header {
    color: #daa520;
    font-size: 15px;
    font-weight: 600;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(184, 134, 11, 0.3);
    margin-bottom: 12px;
  }

  .trade-item-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    color: #c0b090;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .trade-item-price { color: #daa520; font-weight: 500; }

  .trade-proposal-total {
    display: flex;
    justify-content: space-between;
    padding: 10px 0 8px;
    border-top: 1px solid rgba(184, 134, 11, 0.3);
    margin-top: 8px;
    font-weight: 600;
    color: #e8d5a0;
    font-size: 14px;
  }

  .trade-proposal-balance {
    text-align: right;
    font-size: 12px;
    color: #888;
    margin-bottom: 14px;
  }
  .trade-proposal-balance.affordable   { color: #5a8a5a; }
  .trade-proposal-balance.unaffordable { color: #c05050; }

  .trade-proposal-btns {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }

  .trade-btn {
    padding: 8px 18px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s ease;
    border: none;
    font-family: inherit;
  }
  .trade-btn:active { transform: scale(0.96); }

  .trade-btn-confirm {
    background: linear-gradient(135deg, #b8860b, #daa520);
    color: #1a1000;
    font-weight: 600;
  }
  .trade-btn-confirm:hover:not(:disabled) {
    filter: brightness(1.15);
    box-shadow: 0 0 12px rgba(218, 165, 32, 0.35);
  }
  .trade-btn-confirm:disabled {
    background: #3a3a3a;
    color: #666;
    cursor: not-allowed;
    box-shadow: none;
    filter: none;
  }

  .trade-btn-bargain {
    background: transparent;
    border: 1px solid #556;
    color: #8899aa;
    padding: 8px 18px;
  }
  .trade-btn-bargain:hover { border-color: #7799bb; color: #aabbcc; }

  .trade-btn-cancel {
    background: transparent;
    border: none;
    color: #666;
    padding: 8px 12px;
  }
  .trade-btn-cancel:hover { color: #999; }

  @media (max-width: 480px) {
    .trade-proposal-btns { justify-content: stretch; }
    .trade-btn, .trade-btn-bargain, .trade-btn-cancel { flex: 1; text-align: center; }
  }

  #input-area {
    background: #16213e; padding: 12px 16px; border-top: 1px solid #0f3460;
    display: flex; gap: 8px;
  }
  #input {
    flex: 1; background: #0f3460; border: 1px solid #533483;
    color: #e0e0e0; padding: 10px 12px; border-radius: 6px;
    font-family: inherit; font-size: 16px; outline: none;
    resize: none; min-height: 40px; max-height: 120px;
    line-height: 1.4; overflow-y: auto;
  }
  #input:focus { border-color: #e6b800; }
  #input::placeholder { color: #666; }
  #send {
    background: #533483; color: white; border: none; padding: 10px 20px;
    border-radius: 6px; font-size: 15px; cursor: pointer;
  }
  #send:hover { background: #6b44a0; }
  #send:disabled { background: #333; cursor: wait; }

  /* 角色创建界面 */
  #create-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 20px;
  }
  #create-screen h2 { color: #e6b800; margin-bottom: 20px; }
  #create-screen input {
    background: #0f3460; border: 1px solid #533483; color: #e0e0e0;
    padding: 10px; border-radius: 6px; font-size: 16px; width: 250px;
    text-align: center; margin-bottom: 16px;
  }
  .class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .class-btn {
    background: #16213e; border: 2px solid #533483; color: #e0e0e0;
    padding: 12px 16px; border-radius: 8px; cursor: pointer; text-align: center;
  }
  .class-btn:hover { border-color: #e6b800; }
  .class-btn.selected { border-color: #e6b800; background: #1a1a4e; }
  .class-btn .name { font-size: 16px; font-weight: bold; }
  .class-btn .desc { font-size: 12px; color: #888; margin-top: 4px; }
  #start-btn {
    background: #e6b800; color: #1a1a2e; border: none; padding: 12px 40px;
    border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
  }
  #start-btn:hover { background: #ffd000; }
  #start-btn:disabled { background: #666; cursor: not-allowed; }

  /* ─── Bottom Sheet ─── */
  .panel-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .panel-overlay.open { opacity: 1; pointer-events: auto; }

  .panel-sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    /* sit above tab-bar (52px) */
    transform: translateY(100%);
    z-index: 101;
    background: #16213e;
    border-radius: 16px 16px 0 0;
    max-height: 70vh;
    display: flex; flex-direction: column;
    transition: transform 0.3s cubic-bezier(.32,.72,.37,1.02);
    padding-bottom: 52px; /* room for tab bar */
  }
  .panel-sheet.open { transform: translateY(0); }

  .panel-handle {
    display: flex; align-items: center; justify-content: center;
    padding: 10px 16px 0; flex-shrink: 0;
  }
  .panel-handle::before {
    content: ''; display: block; width: 36px; height: 4px;
    background: #555; border-radius: 2px;
  }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px 12px; border-bottom: 1px solid #0f3460; flex-shrink: 0;
  }
  .panel-title { font-size: 16px; font-weight: bold; color: #e6b800; }
  .panel-close {
    background: none; border: none; color: #888; font-size: 20px;
    cursor: pointer; padding: 0 4px; line-height: 1;
  }
  .panel-close:hover { color: #e0e0e0; }
  .panel-body {
    flex: 1; overflow-y: auto; padding: 16px;
    -webkit-overflow-scrolling: touch;
  }

  /* ─── Tab 栏 ─── */
  #tab-bar {
    display: none; /* shown after game starts */
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 52px; background: #16213e;
    border-top: 1px solid #0f3460;
    z-index: 102;
    justify-content: space-around; align-items: center;
  }
  #tab-bar .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 2px;
    color: #888; font-size: 11px; cursor: pointer;
    padding: 6px 0; transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  #tab-bar .tab .tab-icon { font-size: 18px; }
  #tab-bar .tab.active { color: #e6b800; }
  #tab-bar .tab:hover { color: #e6b800; }

  /* ─── 战斗面板 ─── */
  #combat-panel {
    display: none;
    background: #16213e; border-top: 2px solid #ff8c42;
    padding: 12px 16px;
    flex-direction: column; gap: 8px;
  }
  #combat-panel.show { display: flex; }
  .combat-round { color: #ff8c42; font-size: 13px; font-weight: bold; }
  .combat-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .combat-btn {
    background: #2a1a0e; color: #ff8c42; border: 1px solid #ff8c42;
    padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 14px;
    -webkit-tap-highlight-color: transparent; transition: all 0.15s;
  }
  .combat-btn:hover { background: #3a2a15; color: #ffd000; border-color: #ffd000; }
  .combat-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .combat-selector {
    display: none; background: #1a1a2e; border: 1px solid #ff8c42;
    border-radius: 8px; padding: 8px; margin-top: 4px;
  }
  .combat-selector.show { display: block; }
  .combat-selector-title { color: #ff8c42; font-size: 12px; margin-bottom: 6px; }
  .combat-selector-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; cursor: pointer; border-radius: 6px; color: #e0e0e0;
    font-size: 13px; transition: background 0.1s;
  }
  .combat-selector-item:hover { background: #2a1a0e; }
  .combat-selector-item .item-info { color: #888; font-size: 11px; margin-left: 8px; }
  .combat-hp-bar { color: #888; font-size: 11px; }

  /* ─── 面板内容样式 ─── */
  .panel-card {
    background: #1a1a2e; border: 1px solid #0f3460; border-radius: 8px;
    padding: 12px; margin-bottom: 12px;
  }
  .panel-card-title {
    font-size: 14px; font-weight: bold; color: #e6b800; margin-bottom: 8px;
  }

  /* HP / 信任度条 */
  .bar-track {
    width: 100%; height: 10px; background: #0f3460; border-radius: 5px;
    overflow: hidden; margin: 4px 0;
  }
  .bar-fill {
    height: 100%; border-radius: 5px; transition: width 0.3s;
  }
  .bar-fill.hp { background: #4caf50; }
  .bar-fill.hp.warn { background: #ff9800; }
  .bar-fill.hp.danger { background: #f44336; }
  .bar-fill.trust { background: #64b5f6; }
  .bar-fill.xp { background: #bb86fc; }
  .bar-label {
    display: flex; justify-content: space-between; font-size: 12px; color: #aaa;
  }

  /* 属性网格 */
  .attr-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    margin-top: 8px;
  }
  .attr-item {
    background: #0f3460; border-radius: 6px; padding: 8px;
    text-align: center;
  }
  .attr-item .attr-name { font-size: 11px; color: #888; }
  .attr-item .attr-val { font-size: 18px; font-weight: bold; color: #e0e0e0; }

  /* 装备/物品列表 */
  .item-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid #0f3460;
  }
  .item-row:last-child { border-bottom: none; }
  .item-name { font-size: 14px; color: #e0e0e0; }
  .item-detail { font-size: 12px; color: #888; }

  /* 任务 */
  .quest-status { font-size: 12px; padding: 2px 8px; border-radius: 10px; }
  .quest-status.active { background: #1a3a1a; color: #4caf50; }
  .quest-status.completed { background: #3a3a1a; color: #e6b800; }

  .quest-objective {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0; font-size: 13px; color: #ccc;
  }
  .quest-objective.done { color: #888; text-decoration: line-through; }
  .quest-objective::before { content: '☐'; color: #555; }
  .quest-objective.done::before { content: '☑'; color: #4caf50; }

  /* 地图 */
  .map-area {
    display: flex; align-items: center; gap: 10px;
    padding: 10px; border-radius: 6px; margin-bottom: 6px;
    background: #0f3460; cursor: default;
  }
  .map-area.current { border: 1px solid #e6b800; background: #1a1a4e; }
  .map-area .area-marker { font-size: 18px; }
  .map-area .area-name { font-size: 14px; color: #e0e0e0; }
  .map-area .area-desc { font-size: 11px; color: #888; }
  .map-area.current .area-name { color: #e6b800; font-weight: bold; }

  /* "更多" 网格 */
  .more-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .more-item {
    background: #0f3460; border: 1px solid #333; border-radius: 12px;
    padding: 20px 12px; text-align: center; cursor: pointer;
    transition: border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .more-item:hover { border-color: #e6b800; }
  .more-item .more-icon { font-size: 28px; margin-bottom: 6px; }
  .more-item .more-label { font-size: 14px; color: #ccc; }

  /* 探索进度 */
  .explore-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0;
  }
  .explore-loc { font-size: 13px; color: #ccc; }
  .explore-loc.done { color: #4caf50; }
  .explore-pct { font-size: 12px; color: #888; }
  .bar-fill.explore { background: #e6b800; }

  /* 故事回顾 */
  .recap-item {
    padding: 6px 0; border-bottom: 1px solid #0f3460; font-size: 13px;
    color: #ccc; line-height: 1.5;
  }
  .recap-item:last-child { border-bottom: none; }
  .recap-turn {
    display: inline-block; background: #0f3460; color: #888; font-size: 11px;
    padding: 1px 6px; border-radius: 4px; margin-right: 6px;
  }
  .recap-item.clue { color: #64b5f6; padding-left: 8px; }
  .recap-item.clue::before { content: '• '; color: #64b5f6; }
  .recap-item.dialogue { color: #aaa; font-size: 12px; padding-left: 12px; }
  .recap-npc-name { color: #e6b800; font-size: 13px; font-weight: bold; margin-top: 8px; }
  .recap-item.quest { font-size: 13px; }
  .recap-item.quest.done { color: #4caf50; }

  /* NPC 卡片 */
  .npc-card {
    display: flex; align-items: center; gap: 12px;
    background: #1a1a2e; border: 1px solid #0f3460; border-radius: 8px;
    padding: 12px; margin-bottom: 10px;
  }
  .npc-avatar { font-size: 32px; }
  .npc-avatar img {
    width: 48px; height: 48px; border-radius: 6px;
    image-rendering: pixelated; background: #0a0a1e;
    border: 1px solid #333;
  }
  .npc-info { flex: 1; }
  .npc-name { font-size: 14px; font-weight: bold; color: #e0e0e0; }
  .npc-role { font-size: 11px; color: #888; margin-top: 2px; }

  /* 进度条文字 */
  .progress-text { font-size: 11px; color: #888; margin-top: 2px; }

  /* 游戏界面 */
  #game-screen { padding-bottom: 52px; overflow: hidden; }

  /* ─── Pixel Map Grid ─── */
  .map-grid {
    display: grid;
    grid-template-columns: 80px 16px 80px 16px 80px;
    grid-template-rows: 80px 16px 80px 16px 80px;
    justify-content: center;
    margin: 0 auto;
    font-family: 'Courier New', monospace;
  }
  .map-cell {
    border-radius: 6px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px;
    position: relative;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.7);
    border: 2px solid rgba(255,255,255,0.1);
    transition: filter 0.2s;
  }
  .map-cell.empty {
    background: transparent;
    border: 2px dashed #1a1a3e;
    text-shadow: none;
  }
  .map-cell.terrain { cursor: pointer; }
  .map-cell.terrain:hover { filter: brightness(1.3); }
  .map-cell.current {
    border: 2px solid #e6b800 !important;
    animation: mapPulse 2s ease-in-out infinite;
  }
  @keyframes combatFadeIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes mapPulse {
    0%, 100% { box-shadow: 0 0 6px rgba(230,184,0,0.2); }
    50% { box-shadow: 0 0 16px rgba(230,184,0,0.6); }
  }
  .map-cell .cell-pin {
    position: absolute; top: 2px; right: 4px; font-size: 11px;
  }
  .map-cell .cell-icon { font-size: 22px; line-height: 1; }
  .map-cell .cell-name {
    font-size: 10px; color: #e0e0e0; font-weight: bold;
    text-align: center; line-height: 1.1;
  }
  .map-cell .cell-danger { font-size: 9px; letter-spacing: -1px; }
  .map-cell .cell-explore {
    font-size: 9px; color: #e6b800; display: block; margin-top: 2px;
  }
  .map-conn {
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .map-conn-v::before {
    content: ''; position: absolute;
    width: 2px; height: 100%; background: #444;
    left: 50%; transform: translateX(-50%);
  }
  .map-conn-h::before {
    content: ''; position: absolute;
    height: 2px; width: 100%; background: #444;
    top: 50%; transform: translateY(-50%);
  }
  .map-conn-d::before {
    content: ''; position: absolute;
    width: 2px; height: 141%; background: #444;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
  }
  .map-detail {
    background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px;
    padding: 10px 12px; margin-top: 10px;
    font-family: 'Courier New', monospace;
  }
  .map-detail .detail-name { color: #e6b800; font-weight: bold; font-size: 14px; margin-bottom: 4px; }
  .map-detail .detail-danger { color: #ff8c42; font-size: 12px; margin-bottom: 4px; }
  .map-detail .detail-desc { color: #aaa; font-size: 12px; line-height: 1.5; }

  /* ─── Sub-location topology ─── */
  .subloc-topo {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; padding: 4px 0;
  }
  .subloc-node {
    background: #0f1a2e; border: 1px solid #1a3050; border-radius: 8px;
    padding: 8px 10px; text-align: center;
  }
  .subloc-node.current {
    background: #1a2a4e; border-color: #e6b800;
    box-shadow: 0 0 8px rgba(230, 184, 0, 0.2);
  }
  .subloc-name { font-size: 12px; color: #ccc; }
  .subloc-node.current .subloc-name { color: #e6b800; font-weight: bold; }
  .subloc-npcs { font-size: 10px; color: #888; margin-top: 3px; }
  .subloc-you { font-size: 9px; color: #e6b800; margin-top: 2px; }

  /* ─── DM Thinking ─── */
  .thinking {
    color: #888; font-style: italic; font-size: 14px; padding: 4px 0;
  }
  .thinking .dots { margin-left: 2px; }
  .thinking .dots span {
    display: inline-block;
    animation: dotBlink 1.4s infinite;
    opacity: 0;
  }
  .thinking .dots span:nth-child(1) { animation-delay: 0s; }
  .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBlink {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }

  /* ─── NPC Character Card Popup ─── */
  .npc-card-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .npc-card-overlay.open { opacity: 1; pointer-events: auto; }
  .npc-card-popup {
    width: 90vw; max-width: 400px;
    height: 85vh; max-height: 700px;
    background: #12122a;
    border: 1px solid #e6b800;
    border-radius: 14px;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(230,184,0,0.15), 0 20px 60px rgba(0,0,0,0.6);
    transform: scale(0.92) translateY(20px);
    transition: transform 0.4s cubic-bezier(.32,.72,.37,1.02);
    position: relative;
  }
  .npc-card-overlay.open .npc-card-popup {
    transform: scale(1) translateY(0);
  }
  .npc-card-close {
    position: absolute; top: 10px; right: 14px;
    background: rgba(0,0,0,0.5); border: none;
    color: #aaa; font-size: 22px; cursor: pointer;
    z-index: 2; width: 32px; height: 32px;
    border-radius: 50%; display: flex;
    align-items: center; justify-content: center;
    line-height: 1; transition: color 0.2s;
  }
  .npc-card-close:hover { color: #e0e0e0; }
  .npc-card-portrait {
    flex: 0 0 58%;
    background: linear-gradient(180deg, #0a0a1e 0%, #1a1a3e 100%);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .npc-card-portrait img {
    width: 100%; height: 100%; object-fit: contain;
    image-rendering: pixelated;
  }
  .npc-card-portrait::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 40px;
    background: linear-gradient(transparent, #12122a);
  }
  .npc-card-info {
    flex: 1; display: flex; flex-direction: column;
    padding: 14px 18px 10px; overflow: hidden;
  }
  .npc-card-name {
    font-size: 22px; font-weight: bold; color: #e6b800;
    margin-bottom: 2px;
  }
  .npc-card-title {
    font-size: 13px; color: #888; margin-bottom: 10px;
  }
  .npc-card-divider {
    height: 1px; background: #333; margin-bottom: 10px; flex-shrink: 0;
  }
  .npc-card-facts {
    flex: 1; overflow-y: auto; padding-right: 4px;
    -webkit-overflow-scrolling: touch;
  }
  .npc-card-facts li {
    color: #ccc; font-size: 13px; line-height: 1.6;
    list-style: none; padding-left: 14px; position: relative;
    margin-bottom: 4px;
  }
  .npc-card-facts li::before {
    content: '◆'; position: absolute; left: 0; color: #e6b800;
    font-size: 8px; top: 5px;
  }
  .npc-card-footer {
    text-align: center; font-size: 11px; color: #555;
    padding: 8px 0 4px; flex-shrink: 0;
  }

  /* ─── DM 思考日志面板 ─── */
  .thinking-panel {
    position: fixed;
    bottom: 60px;
    right: 12px;
    width: 350px;
    max-height: 400px;
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 8px;
    z-index: 100;
    font-size: 12px;
    overflow: hidden;
  }
  .thinking-panel.collapsed .thinking-content { display: none; }
  .thinking-header {
    padding: 8px 12px;
    background: #16213e;
    cursor: pointer;
    color: #8888aa;
    font-size: 11px;
    user-select: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .thinking-content {
    max-height: 350px;
    overflow-y: auto;
    padding: 8px 12px;
    color: #7a7a9a;
    white-space: pre-wrap;
    font-family: monospace;
    font-size: 11px;
    line-height: 1.4;
  }
  .thinking-entry {
    border-bottom: 1px solid #222;
    padding: 6px 0;
    margin-bottom: 4px;
  }
  .thinking-entry .turn-label {
    color: #5a5a8a;
    font-size: 10px;
    margin-bottom: 2px;
  }
</style>
</head>
<body>

<!-- 密码验证 -->
<div id="auth-screen" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
  <h2 style="color:#e6b800; margin-bottom:10px">⚔️ 破晓镇 · 蚀目之影</h2>
  <p style="color:#888; margin-bottom:20px">请输入访问密码</p>
  <input id="auth-password" type="password" placeholder="密码" style="background:#0f3460; border:1px solid #533483; color:#e0e0e0; padding:10px; border-radius:6px; font-size:16px; width:250px; text-align:center; margin-bottom:12px;">
  <button id="auth-btn" onclick="authenticate()" style="background:#533483; color:white; border:none; padding:10px 30px; border-radius:6px; font-size:15px; cursor:pointer;">进入</button>
  <p id="auth-error" style="color:#ff6b6b; margin-top:10px; display:none;"></p>
</div>

<!-- 恢复存档 -->
<div id="resume-screen" style="display:none; flex:1; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
  <h2 style="color:#e6b800; margin-bottom:10px">⚔️ 欢迎回来</h2>
  <div id="resume-info" style="color:#aaa; margin-bottom:20px; text-align:center; line-height:1.8;"></div>
  <div style="display:flex; gap:12px;">
    <button onclick="resumeGame()" style="background:#533483; color:white; border:none; padding:12px 30px; border-radius:8px; font-size:15px; cursor:pointer;">继续冒险</button>
    <button onclick="newGame()" style="background:#333; color:#aaa; border:1px solid #555; padding:12px 20px; border-radius:8px; font-size:14px; cursor:pointer;">新游戏</button>
  </div>
</div>

<!-- 角色创建 -->
<div id="create-screen" style="display:none">
  <h2>⚔️ 破晓镇 · 蚀目之影</h2>
  <p style="color:#888; margin-bottom:20px; text-align:center">一个 AI 驱动的跑团冒险游戏</p>
  <input id="player-name" placeholder="你叫什么名字？" autofocus>
  <p style="color:#aaa; margin-bottom:10px">选择职业:</p>
  <div class="class-grid">
    <div class="class-btn" data-class="fighter" onclick="selectClass(this)">
      <div class="name">⚔️ 剑士</div>
      <div class="desc">力量与勇气 STR 16</div>
    </div>
    <div class="class-btn" data-class="mage" onclick="selectClass(this)">
      <div class="name">🔮 法师</div>
      <div class="desc">奥术知识 INT 16</div>
    </div>
    <div class="class-btn" data-class="ranger" onclick="selectClass(this)">
      <div class="name">🏹 游侠</div>
      <div class="desc">敏捷感知 DEX 16</div>
    </div>
    <div class="class-btn" data-class="cleric" onclick="selectClass(this)">
      <div class="name">✨ 牧师</div>
      <div class="desc">信仰治疗 WIS 16</div>
    </div>
  </div>
  <button id="start-btn" disabled onclick="startGame()">开始冒险</button>
</div>

<!-- 游戏界面 -->
<div id="game-screen" style="display:none; flex:1; flex-direction:column;">
  <div id="header">
    <h1>⚔️ 破晓镇 · 蚀目之影</h1>
    <div id="player-hud" style="display:none;font-size:12px;color:#aaa;margin-top:4px">
      <span id="hud-hp" style="color:#4caf50">❤️ --/--</span>
      <span style="margin:0 8px;color:#333">|</span>
      <span id="hud-gold" style="color:#e6b800">💰 --</span>
      <span style="margin:0 8px;color:#333">|</span>
      <span id="hud-location" style="color:#888">📍 --</span>
    </div>
  </div>
  <div id="messages"></div>

  <!-- 战斗操作面板 -->
  <div id="combat-panel">
    <div class="combat-round" id="combat-round-label"></div>
    <div class="combat-actions" id="combat-actions">
      <button class="combat-btn" onclick="combatAttack()">⚔ 攻击</button>
      <button class="combat-btn" onclick="combatSpell()">✨ 法术</button>
      <button class="combat-btn" onclick="combatItem()">🧪 物品</button>
      <button class="combat-btn" onclick="combatFlee()">🏃 逃跑</button>
      <button class="combat-btn" onclick="combatDefend()">🛡 防御</button>
    </div>
    <div class="combat-selector" id="combat-selector"></div>
  </div>

  <div id="input-area">
    <textarea id="input" placeholder="说点什么..." autocomplete="off" rows="1"></textarea>
    <button id="send" onclick="sendInput()">发送</button>
  </div>
</div>

<!-- DM 思考日志面板 -->
<div id="dm-thinking-panel" class="thinking-panel collapsed" style="display:none">
  <div class="thinking-header" onclick="toggleThinking()">
    <span>DM 思考日志</span>
    <span id="thinking-toggle">▶</span>
  </div>
  <div id="thinking-content" class="thinking-content"></div>
</div>

<!-- Bottom Sheet -->
<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="panel-sheet" id="panel-sheet">
  <div class="panel-handle"></div>
  <div class="panel-header">
    <span class="panel-title" id="panel-title"></span>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<!-- NPC Character Card Popup -->
<div class="npc-card-overlay" id="npc-card-overlay" onclick="closeNPCCard()">
  <div class="npc-card-popup" onclick="event.stopPropagation()">
    <button class="npc-card-close" onclick="closeNPCCard()">✕</button>
    <div class="npc-card-portrait" id="npc-card-portrait"></div>
    <div class="npc-card-info">
      <div class="npc-card-name" id="npc-card-name"></div>
      <div class="npc-card-title" id="npc-card-title"></div>
      <div class="npc-card-divider"></div>
      <ul class="npc-card-facts" id="npc-card-facts"></ul>
      <div class="npc-card-footer">已收藏到人物档案</div>
    </div>
  </div>
</div>

<!-- Tab 栏 -->
<div id="tab-bar">
  <div class="tab active" data-tab="game" onclick="switchTab('game')">
    <span class="tab-icon">🎮</span>
    <span>游戏</span>
  </div>
  <div class="tab" data-tab="status" onclick="switchTab('status')">
    <span class="tab-icon">👤</span>
    <span>状态</span>
  </div>
  <div class="tab" data-tab="npc" onclick="switchTab('npc')">
    <span class="tab-icon">📋</span>
    <span>人物</span>
  </div>
  <div class="tab" data-tab="map" onclick="switchTab('map')">
    <span class="tab-icon">🗺</span>
    <span>地图</span>
  </div>
  <div class="tab" data-tab="more" onclick="switchTab('more')">
    <span class="tab-icon">⋯</span>
    <span>更多</span>
  </div>
</div>

<script>
let ws = null
let selectedClass = null
let sending = false
let currentDmDiv = null
let authToken = null
let combatMode = false
let combatTargets = []     // alive monsters for target selection
let combatSpells = []      // available spells
let combatItems = []       // available items (potions)
let combatRound = 1        // current combat round
let currentPanelId = null  // track which panel is open
let isResuming = false     // true when reconnecting with saved session
let currentThinkingEntry = null  // current turn's thinking DOM element
let thinkingTurnCount = 0        // local turn counter for thinking labels

// ─── localStorage 存档 ───
const SAVE_KEYS = { session: 'trpg_session', messages: 'trpg_messages', dossier: 'trpg_dossier' }

function saveToLocal(session, dossier) {
  try {
    if (session) localStorage.setItem(SAVE_KEYS.session, JSON.stringify(session))
    if (dossier) localStorage.setItem(SAVE_KEYS.dossier, JSON.stringify(dossier))
  } catch {}
}

function saveMessage(role, text) {
  try {
    const raw = localStorage.getItem(SAVE_KEYS.messages)
    const msgs = raw ? JSON.parse(raw) : []
    msgs.push({ role, text: text.slice(0, 500) })
    // 保留最近 50 条
    while (msgs.length > 50) msgs.shift()
    localStorage.setItem(SAVE_KEYS.messages, JSON.stringify(msgs))
  } catch {}
}

function getSavedSession() {
  try {
    const raw = localStorage.getItem(SAVE_KEYS.session)
    return raw ? JSON.parse(raw) : null
  } catch { return null }
}

function getSavedDossier() {
  try {
    const raw = localStorage.getItem(SAVE_KEYS.dossier)
    return raw ? JSON.parse(raw) : null
  } catch { return null }
}

function getSavedMessages() {
  try {
    const raw = localStorage.getItem(SAVE_KEYS.messages)
    return raw ? JSON.parse(raw) : []
  } catch { return [] }
}

function clearSave() {
  localStorage.removeItem(SAVE_KEYS.session)
  localStorage.removeItem(SAVE_KEYS.messages)
  localStorage.removeItem(SAVE_KEYS.dossier)
}

// ─── DM 思考面板 ───
function toggleThinking() {
  const panel = document.getElementById('dm-thinking-panel')
  const toggle = document.getElementById('thinking-toggle')
  if (!panel) return
  panel.classList.toggle('collapsed')
  toggle.textContent = panel.classList.contains('collapsed') ? '▶' : '▼'
}

// ─── 密码认证 + 存档检查 ───
;(async function checkAuth() {
  // 先检查是否需要密码
  try {
    const health = await fetch('/api/health').then(r => r.json())
    if (!health.password) {
      // 无密码模式 → 直接跳过认证
      authToken = ''
      document.getElementById('auth-screen').style.display = 'none'
      showEntryScreen()
      return
    }
  } catch {}

  // 有密码模式 → 检查已保存的 token
  const saved = localStorage.getItem('trpg_token')
  if (saved) {
    authToken = saved
    document.getElementById('auth-screen').style.display = 'none'
    showEntryScreen()
  }
})()

// 初始化思考面板可见性
;(function initThinkingPanel() {
  const panel = document.getElementById('dm-thinking-panel')
  if (panel && localStorage.getItem('trpg_dev_thinking') === '1') {
    panel.style.display = 'block'
  }
})()

function showEntryScreen() {
  const session = getSavedSession()
  if (session && session.player) {
    // 有存档 → 显示恢复界面
    const p = session.player
    const classNames = { fighter: '剑士', mage: '法师', ranger: '游侠', cleric: '牧师' }
    const className = classNames[session.classId] || session.classId || ''
    document.getElementById('resume-info').innerHTML =
      `<strong style="color:#e0e0e0;font-size:18px">${esc(p.name)}</strong><br>` +
      `${p.level}级${esc(className)} · HP ${p.hp}/${p.maxHp} · 金币 ${p.gold}`
    document.getElementById('resume-screen').style.display = 'flex'
  } else {
    document.getElementById('create-screen').style.display = 'flex'
  }
}

async function authenticate() {
  const pw = document.getElementById('auth-password').value
  const errEl = document.getElementById('auth-error')
  errEl.style.display = 'none'

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    })
    const data = await res.json()
    if (data.ok) {
      authToken = data.token ?? ''
      localStorage.setItem('trpg_token', authToken)
      document.getElementById('auth-screen').style.display = 'none'
      showEntryScreen()
    } else {
      errEl.textContent = data.error ?? '密码错误'
      errEl.style.display = 'block'
    }
  } catch {
    errEl.textContent = '网络错误'
    errEl.style.display = 'block'
  }
}

// ─── 恢复 / 新游戏 ───
function resumeGame() {
  const session = getSavedSession()
  const dossier = getSavedDossier()
  if (!session) { newGame(); return }

  document.getElementById('resume-screen').style.display = 'none'
  const gameScreen = document.getElementById('game-screen')
  gameScreen.style.display = 'flex'
  document.getElementById('tab-bar').style.display = 'flex'
  isResuming = true

  // 恢复聊天记录
  const msgs = getSavedMessages()
  const container = document.getElementById('messages')
  for (const m of msgs) {
    const cls = m.role === 'dm' ? 'dm' : m.role === 'player' ? 'player' : 'system'
    appendMsg(m.text, cls)
  }

  connectWs((ws) => {
    ws.send(JSON.stringify({ type: 'resume', session, dossier }))
  })
}

function newGame() {
  clearSave()
  document.getElementById('resume-screen').style.display = 'none'
  document.getElementById('create-screen').style.display = 'flex'
  document.getElementById('player-name').focus()
}

document.getElementById('auth-password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') authenticate()
})

function selectClass(el) {
  document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('selected'))
  el.classList.add('selected')
  selectedClass = el.dataset.class
  document.getElementById('start-btn').disabled = !document.getElementById('player-name').value.trim()
}

document.getElementById('player-name').addEventListener('input', () => {
  document.getElementById('start-btn').disabled = !document.getElementById('player-name').value.trim() || !selectedClass
})

// ─── Bottom Sheet ───
function openPanel(panelId, title, contentHtml) {
  currentPanelId = panelId
  document.getElementById('panel-title').textContent = title
  document.getElementById('panel-body').innerHTML = contentHtml
  document.getElementById('panel-overlay').classList.add('open')
  document.getElementById('panel-sheet').classList.add('open')
  // highlight active tab
  document.querySelectorAll('#tab-bar .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === panelId)
  })
}

function closePanel() {
  currentPanelId = null
  document.getElementById('panel-overlay').classList.remove('open')
  document.getElementById('panel-sheet').classList.remove('open')
  // set game tab active
  document.querySelectorAll('#tab-bar .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === 'game')
  })
}

// ─── Tab 切换 ───
function switchTab(tab) {
  // 再点同一个 tab → 关闭面板（回到游戏）
  if (currentPanelId === tab || (tab === 'game' && !currentPanelId)) {
    closePanel()
    return
  }
  if (tab === 'game') {
    closePanel()
    return
  }
  if (tab === 'more') {
    openPanel('more', '更多', renderMorePanel())
    // 同步 checkbox 到 localStorage 状态
    const cb = document.getElementById('dev-thinking-toggle')
    if (cb) cb.checked = localStorage.getItem('trpg_dev_thinking') === '1'
    return
  }
  // 查看面板不受 sending 阻塞（DM 思考时也能查看）
  const cmdMap = { status: '/status', quest: '/quest', map: '/map', npc: '/npc' }
  const cmd = cmdMap[tab]
  if (cmd && ws) {
    ws.send(JSON.stringify({ type: 'view', text: cmd }))
  }
}

// ─── 面板渲染器 ───
function renderStatusPanel(data) {
  const hp = data.hp ?? 0, maxHp = data.maxHp ?? 1
  const hpPct = Math.round((hp / maxHp) * 100)
  const hpClass = hpPct > 50 ? 'hp' : hpPct > 25 ? 'hp warn' : 'hp danger'

  const xp = data.xp ?? 0, xpNext = data.xpNext ?? 100
  const xpPct = Math.round((xp / xpNext) * 100)

  let html = `<div class="panel-card">`
  html += `<div class="panel-card-title">${esc(data.name || '冒险者')} · Lv.${data.level ?? 1} ${esc(data.className || '')}</div>`
  // HP
  html += `<div class="bar-label"><span>HP</span><span>${hp} / ${maxHp}</span></div>`
  html += `<div class="bar-track"><div class="bar-fill ${hpClass}" style="width:${hpPct}%"></div></div>`
  // XP
  html += `<div class="bar-label"><span>经验</span><span>${xp} / ${xpNext}</span></div>`
  html += `<div class="bar-track"><div class="bar-fill xp" style="width:${xpPct}%"></div></div>`
  html += `</div>`

  // 属性
  const attrs = data.attributes || {}
  const attrNames = { STR: '力量', DEX: '敏捷', CON: '体质', INT: '智力', WIS: '感知', CHA: '魅力' }
  html += `<div class="panel-card"><div class="panel-card-title">属性</div><div class="attr-grid">`
  for (const [key, label] of Object.entries(attrNames)) {
    html += `<div class="attr-item"><div class="attr-name">${label}</div><div class="attr-val">${attrs[key] ?? '—'}</div></div>`
  }
  html += `</div></div>`

  // 装备
  if (data.equipment && data.equipment.length) {
    html += `<div class="panel-card"><div class="panel-card-title">装备</div>`
    for (const eq of data.equipment) {
      html += `<div class="item-row"><span class="item-name">${esc(eq.name)}</span><span class="item-detail">${esc(eq.slot || '')}</span></div>`
    }
    html += `</div>`
  }

  // 法术/技能
  if (data.spells && data.spells.length) {
    html += `<div class="panel-card"><div class="panel-card-title">法术</div>`
    for (const sp of data.spells) {
      const usage = sp.isCantrip ? '戏法' : `${sp.remaining}/${sp.max}`
      html += `<div class="item-row"><span class="item-name">${esc(sp.name)}</span><span class="item-detail">${usage}</span></div>`
    }
    html += `</div>`
  }

  return html
}

function renderQuestPanel(data) {
  const quests = data.quests || []
  if (!quests.length) return `<div class="panel-card"><div style="color:#888;text-align:center;padding:20px;">暂无任务</div></div>`

  let html = ''
  for (const q of quests) {
    const isComplete = q.status === 'completed'
    html += `<div class="panel-card">`
    html += `<div style="display:flex;justify-content:space-between;align-items:center;">`
    html += `<div class="panel-card-title" style="margin-bottom:0">${esc(q.name)}</div>`
    html += `<span class="quest-status ${isComplete ? 'completed' : 'active'}">${isComplete ? '已完成' : '进行中'}</span>`
    html += `</div>`
    if (q.description) html += `<div style="font-size:12px;color:#aaa;margin:6px 0">${esc(q.description)}</div>`
    // progress bar
    if (q.progress != null) {
      const pct = Math.round(q.progress * 100)
      html += `<div class="bar-track"><div class="bar-fill hp" style="width:${pct}%;background:#e6b800"></div></div>`
      html += `<div class="progress-text">${pct}% 完成</div>`
    }
    // objectives
    if (q.objectives && q.objectives.length) {
      for (const obj of q.objectives) {
        html += `<div class="quest-objective ${obj.done ? 'done' : ''}">${esc(obj.text)}</div>`
      }
    }
    html += `</div>`
  }
  return html
}

function renderMapPanel(data) {
  const areas = (data.locations || data.areas || []).map(a => ({
    ...a, name: a.nameZh || a.name || ''
  }))
  const current = data.currentLocation || data.currentArea || ''
  window._mapAreas = areas
  const exploreData = window._exploreData || {}

  const TERRAIN = {
    '破晓镇':   { icon: '🏘️', color: '#8B4513', row: 3, col: 3 },
    '暮色森林': { icon: '🌲', color: '#2d5016', row: 5, col: 1 },
    '灰脊矿道': { icon: '⛏️', color: '#4a4a5a', row: 1, col: 3 },
    '碎石荒原': { icon: '🏜️', color: '#8B7355', row: 3, col: 5 },
  }
  const CONN_DEFS = [
    { from: '灰脊矿道', to: '破晓镇', row: 2, col: 3, type: 'v' },
    { from: '破晓镇', to: '碎石荒原', row: 3, col: 4, type: 'h' },
    { from: '破晓镇', to: '暮色森林', row: 4, col: 2, type: 'd' },
  ]

  let html = ''
  if (data.regionName) {
    html += `<div class="panel-card"><div class="panel-card-title">${esc(data.regionName)}</div>`
    if (data.regionDesc) html += `<div style="font-size:12px;color:#aaa">${esc(data.regionDesc)}</div>`
    html += `</div>`
  }

  const cells = []
  const occupied = new Set()
  const areaNames = new Set(areas.map(a => a.name))

  for (let i = 0; i < areas.length; i++) {
    const area = areas[i]
    const t = TERRAIN[area.name]
    if (!t) continue
    occupied.add(`${t.row},${t.col}`)
    const isCurrent = area.id === current || area.name === current
    const danger = area.danger != null ? area.danger : null
    cells.push(
      `<div class="map-cell terrain${isCurrent ? ' current' : ''}" ` +
      `style="grid-row:${t.row};grid-column:${t.col};background:${t.color}" ` +
      `onclick="toggleMapDetail(${i})">` +
      (isCurrent ? '<span class="cell-pin">📍</span>' : '') +
      `<span class="cell-icon">${t.icon}</span>` +
      `<span class="cell-name">${esc(area.name)}</span>` +
      (danger != null ? `<span class="cell-danger">${renderDanger(danger)}</span>` : '') +
      (function() {
        const ei = exploreData[area.name]
        if (ei && ei.total > 0) return `<span class="cell-explore">${ei.found}/${ei.total}</span>`
        return ''
      })() +
      `</div>`
    )
  }

  // Empty area slots
  const slots = [[1,1],[1,3],[1,5],[3,1],[3,3],[3,5],[5,1],[5,3],[5,5]]
  for (const [r, c] of slots) {
    if (!occupied.has(`${r},${c}`)) {
      cells.push(`<div class="map-cell empty" style="grid-row:${r};grid-column:${c}"></div>`)
    }
  }

  // Connections (only between areas present in data)
  for (const conn of CONN_DEFS) {
    if (areaNames.has(conn.from) && areaNames.has(conn.to)) {
      cells.push(`<div class="map-conn map-conn-${conn.type}" style="grid-row:${conn.row};grid-column:${conn.col}"></div>`)
    }
  }

  html += `<div class="map-grid">${cells.join('')}</div>`
  html += `<div id="map-detail-box"></div>`

  // Fallback list for unmapped areas
  const unmapped = areas.filter(a => !TERRAIN[a.name])
  for (const area of unmapped) {
    const isCurrent = area.id === current || area.name === current
    html += `<div class="map-area ${isCurrent ? 'current' : ''}" style="margin-top:8px">`
    html += `<span class="area-marker">${isCurrent ? '📍' : '📌'}</span>`
    html += `<div><div class="area-name">${esc(area.name)}</div>`
    if (area.description) html += `<div class="area-desc">${esc(area.description)}</div>`
    html += `</div></div>`
  }

  if (!areas.length) {
    html += `<div class="panel-card"><div style="color:#888;text-align:center;padding:20px;">地图未知</div></div>`
  }

  // Sub-location topology (当前区域内地点关系) + 前往按钮
  const subLocs = data.subLocations || []
  if (subLocs.length > 0) {
    html += `<div class="panel-card" style="margin-top:12px"><div class="panel-card-title">📍 当前区域内地点</div>`
    html += `<div class="subloc-topo">`
    for (const sl of subLocs) {
      const isCurrent = sl.isCurrent
      const npcList = (sl.npcs || []).join('、')
      html += `<div class="subloc-node${isCurrent ? ' current' : ''}" style="display:flex;align-items:center;justify-content:space-between">`
      html += `<div>`
      html += `<div class="subloc-name">${esc(sl.nameZh)}</div>`
      if (npcList) html += `<div class="subloc-npcs">👤 ${esc(npcList)}</div>`
      if (isCurrent) html += `<div class="subloc-you">← 你在这里</div>`
      html += `</div>`
      if (!isCurrent) {
        html += `<button onclick="mapGo('${esc(sl.nameZh)}')" `
        html += `style="flex-shrink:0;background:#0f3460;color:#ccc;border:1px solid #333;padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer">前往</button>`
      }
      html += `</div>`
    }
    html += `</div></div>`
  }

  // 相邻可达区域 + 前往按钮
  const reachable = data.reachableAreas || []
  if (reachable.length > 0) {
    html += `<div class="panel-card" style="margin-top:12px"><div class="panel-card-title">🚶 可前往的区域</div>`
    for (const area of reachable) {
      html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a2e">`
      html += `<div>`
      html += `<div style="color:#ccc;font-size:14px">${esc(area.nameZh)}</div>`
      if (area.description) html += `<div style="color:#666;font-size:11px;margin-top:2px">${esc(area.description)}</div>`
      html += `</div>`
      html += `<button onclick="mapGo('${esc(area.nameZh)}')" `
      html += `style="flex-shrink:0;margin-left:8px;background:#533483;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer">前往</button>`
      html += `</div>`
    }
    html += `</div>`
  }

  return html
}

/** 地图前往按钮：直接发送精确移动指令 */
function mapGo(destination) {
  document.getElementById('input').value = `前往${destination}`
  sendInput()

function renderDanger(level) {
  const n = typeof level === 'number' ? level : parseInt(level)
  if (!isNaN(n)) {
    const max = 5
    return '★'.repeat(Math.min(n, max)) + '☆'.repeat(Math.max(max - n, 0))
  }
  return esc(String(level))
}

function toggleMapDetail(idx) {
  const area = window._mapAreas?.[idx]
  if (!area) return
  const box = document.getElementById('map-detail-box')
  if (!box) return
  if (box.dataset.idx === String(idx)) { box.innerHTML = ''; box.dataset.idx = ''; return }
  box.dataset.idx = idx
  let h = `<div class="map-detail"><div class="detail-name">📍 ${esc(area.name)}</div>`
  if (area.danger != null) h += `<div class="detail-danger">⚠ 危险等级: ${renderDanger(area.danger)}</div>`
  if (area.description) h += `<div class="detail-desc">${esc(area.description)}</div>`
  h += `</div>`
  box.innerHTML = h
}

  const seen = new Map()
  for (const it of items) {
    const key = it.name + '|' + (it.price ?? 0)

  for (const [, it] of seen) {
    const qty = it.count > 1 ? ` ×${it.count}` : ''

// ─── 下载/上传存档 ───
function downloadSave() {
  const session = getSavedSession()
  if (!session) { closePanel(); appendMsg('没有可下载的存档', 'error'); return }
  const dossier = getSavedDossier()
  const data = { session, dossier, messages: getSavedMessages(), exportedAt: new Date().toISOString() }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url
  a.download = `trpg-save-${session.player?.name || 'unknown'}.json`
  a.click()
  URL.revokeObjectURL(url)
  closePanel()
}

function triggerUploadSave() {
  document.getElementById('save-upload').click()
}

function uploadSave(input) {
  const file = input.files?.[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result)
      const session = data.session
      if (!session?.player) throw new Error('无效存档')
      // 写入 localStorage
      saveToLocal(session, data.dossier)
      if (data.messages) localStorage.setItem(SAVE_KEYS.messages, JSON.stringify(data.messages))
      closePanel()
      // 如果游戏已在运行，发 resume；否则刷新
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resume', session, dossier: data.dossier }))
        appendMsg('存档已上传，正在恢复...', 'reconnect')
      } else {
        location.reload()
      }
    } catch (err) {
      appendMsg('存档文件无效: ' + err.message, 'error')
    }
    input.value = ''
  }
  reader.readAsText(file)
}
