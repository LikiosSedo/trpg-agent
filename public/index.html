function renderNPCListPanel(data) {
  const npcs = data.npcs || []
  if (!npcs.length) return `<div class="panel-card"><div style="color:#888;text-align:center;padding:20px;">尚未遇到任何人物</div></div>`

  const npcLocs = data.npcLocations || {}
  const playerLoc = data.playerLocation || ''
  const playerSub = data.playerSubLocation || ''

  // 分组：在场 vs 不在场
  const here = [], away = []
  for (const npc of npcs) {
    const loc = npcLocs[npc.name]
    const sameArea = loc && loc.location === playerLoc
    const sameSub = sameArea && loc.subLocation === playerSub
    if (sameSub) here.push(npc)
    else away.push(npc)
  }

  let html = ''

  // 在场 NPC（有交谈按钮）
  if (here.length) {
    html += `<div style="font-size:12px;color:#e6b800;padding:4px 8px;margin-bottom:4px">当前在场</div>`
    for (const npc of here) html += renderNPCCard(npc, npcLocs, true)
  }

  // 不在场 NPC（灰显 + 标注位置）
  if (away.length) {
    html += `<div style="font-size:12px;color:#666;padding:4px 8px;margin-top:8px;margin-bottom:4px">不在身边</div>`
    for (const npc of away) html += renderNPCCard(npc, npcLocs, false)
  }

  return html
}

function renderNPCCard(npc, npcLocs, isHere) {
  const trust = npc.trust ?? 0
  const trustPct = ((trust + 10) / 20) * 100
  const trustColor = trust > 0 ? '#4caf50' : trust < 0 ? '#f44336' : '#888'
  const portrait = NPC_PORTRAIT_MAP[npc.name] ||
    Object.entries(NPC_PORTRAIT_MAP).find(([k]) => npc.name.includes(k))?.[1]
  const shortName = Object.keys(NPC_PORTRAIT_MAP).find(k => npc.name.includes(k)) || npc.name
  const loc = npcLocs[npc.name]
  const opacity = isHere ? '1' : '0.5'

  let html = `<div class="npc-card" style="cursor:pointer;opacity:${opacity}">`
  // 左侧：头像（点击看详情）
  html += `<div class="npc-avatar" onclick="viewNPCDetail('${esc(shortName)}')">${portrait
    ? `<img src="${portrait}" alt="${esc(npc.name)}" onerror="this.outerHTML='👤'">`
    : esc(npc.avatar || '👤')}</div>`
  html += `<div class="npc-info" onclick="viewNPCDetail('${esc(shortName)}')">`
  const conditionLabels = { wounded: '负伤', unconscious: '昏迷', recovering: '恢复中' }
  const conditionColors = { wounded: '#e89b3e', unconscious: '#c05050', recovering: '#8888aa' }
  const cond = npc.condition && npc.condition !== 'normal' ? npc.condition : null
  html += `<div class="npc-name">${esc(npc.name)} ${cond ? `<span style="font-size:11px;color:${conditionColors[cond]};margin-left:4px;font-weight:600">[${conditionLabels[cond]}]</span>` : ''} <span style="font-size:11px;color:#555">▶</span></div>`
  if (npc.title) html += `<div class="npc-role">${esc(npc.title)}</div>`
  if (!isHere && loc) {
    html += `<div style="font-size:11px;color:#888;margin-top:2px">📍 ${esc(loc.subLocationZh || loc.locationZh)}</div>`
  }
  html += `<div class="bar-label"><span>信任度</span><span>${trust > 0 ? '+' : ''}${trust}</span></div>`
  html += `<div class="bar-track"><div class="bar-fill" style="width:${trustPct}%;background:${trustColor}"></div></div>`
  html += `</div>`
  // 右侧：交谈 + 攻击按钮（仅在场 NPC）
  if (isHere) {
    const canTalk = cond !== 'unconscious'  // 昏迷不能对话，负伤/恢复中可以
    const canAttack = cond !== 'unconscious' && cond !== 'recovering'  // 昏迷/恢复中不能攻击
    html += `<div style="flex-shrink:0;margin-left:8px;display:flex;flex-direction:column;gap:4px">`
    if (canTalk) {
      html += `<button onclick="event.stopPropagation();npcTalk('${esc(shortName)}')" `
      html += `style="background:#533483;color:#fff;border:none;padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;white-space:nowrap">💬 交谈</button>`
    } else {
      html += `<button disabled style="background:#333;color:#666;border:none;padding:5px 10px;border-radius:6px;font-size:11px;cursor:not-allowed;white-space:nowrap">💬 交谈</button>`
    }
    if (canAttack) {
      html += `<button onclick="event.stopPropagation();npcAttack('${esc(shortName)}')" `
      html += `style="background:#8b1a1a;color:#ff4444;border:1px solid #aa2020;padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;white-space:nowrap;font-weight:600">⚔ 攻击</button>`
    } else {
      html += `<button disabled style="background:#222;color:#555;border:1px solid #333;padding:5px 10px;border-radius:6px;font-size:11px;cursor:not-allowed;white-space:nowrap">⚔ 攻击</button>`
    }
    html += `</div>`
  }
  html += `</div>`
  return html
}

/** 交谈按钮：填入输入框，不自动发送，玩家可补充内容 */
function npcTalk(name) {
  const input = document.getElementById('input')
  input.value = `和${name}交谈：`
  input.focus()
  switchTab('game')
}

/** 攻击按钮：确认后发送攻击指令 */
function npcAttack(name) {
  if (!confirm(`确定要攻击${name}吗？这会产生严重后果（信任暴跌、可能被追捕）。`)) return
  const input = document.getElementById('input')
  input.value = `攻击${name}`
  switchTab('game')
  // 自动发送
  setTimeout(() => sendInput(), 100)
}

function renderInventoryPanel(data) {
  let html = ''
  // equipment section
  const equip = data.equipment || []
  if (equip.length) {
    html += `<div class="panel-card"><div class="panel-card-title">装备</div>`
    for (const e of equip) {
      html += `<div class="item-row"><span class="item-name">${esc(e.name)}</span><span class="item-detail">${esc(e.slot || e.type || '')}</span></div>`
    }
    html += `</div>`
  }
  // items section
  const items = data.items || []
  if (items.length) {
    html += `<div class="panel-card"><div class="panel-card-title">物品</div>`
    for (const it of items) {
      const qty = it.quantity > 1 ? ` ×${it.quantity}` : ''
      html += `<div class="item-row"><span class="item-name">${esc(it.name)}${qty}</span><span class="item-detail">${esc(it.description || '')}</span></div>`
    }
    html += `</div>`
  }
  if (!equip.length && !items.length) {
    html += `<div class="panel-card"><div style="color:#888;text-align:center;padding:20px;">背包空空如也</div></div>`
  }
  return html
}

function renderNPCDetailPanel(data) {
  if (!data || !data.name) return `<div class="panel-card"><div style="color:#888;padding:20px;">未找到该人物信息</div></div>`

  const portrait = NPC_PORTRAIT_MAP[data.name] ||
    Object.entries(NPC_PORTRAIT_MAP).find(([k]) => data.name.includes(k))?.[1]

  let html = ''
  // 大幅立绘（类似首次解锁卡片风格）
  if (portrait) {
    html += `<div style="position:relative;width:100%;padding-top:75%;background:#0a0a1e;border-radius:10px 10px 0 0;overflow:hidden">`
    html += `<img src="${portrait}" alt="${esc(data.name)}" style="position:absolute;top:0;left:50%;transform:translateX(-50%);height:100%;width:auto;image-rendering:pixelated" onerror="this.style.display='none'">`
    html += `<div style="position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(transparent,#1a1a2e)"></div>`
    html += `</div>`
  }
  html += `<div class="panel-card" style="text-align:center;padding:16px;${portrait ? 'border-top-left-radius:0;border-top-right-radius:0;margin-top:0' : ''}">`
  html += `<div style="font-size:20px;font-weight:bold;color:#e6b800">${esc(data.name)}</div>`
  html += `<div style="font-size:13px;color:#888;margin-top:4px">${esc(data.title || '')}</div>`
  // 信任度（双色渐变条 + 指针）
  const trust = data.trust ?? 0
  const trustPct = ((trust + 10) / 20) * 100
  html += `<div style="margin-top:14px">`
  html += `<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:#f44336">-10</span><span style="color:#ccc">信任度: <b>${trust > 0 ? '+' : ''}${trust}</b></span><span style="color:#4caf50">+10</span></div>`
  html += `<div style="position:relative;height:8px;background:linear-gradient(to right,#6a1a1a,#333 50%,#1a4a1a);border-radius:4px">`
  html += `<div style="position:absolute;left:${trustPct}%;top:-3px;width:4px;height:14px;background:#e6b800;border-radius:2px;transform:translateX(-50%);box-shadow:0 0 6px rgba(230,184,0,0.5)"></div>`
  html += `</div></div>`
  html += `</div>`

  // 外貌
  if (data.appearance) {
    html += `<div class="panel-card"><div class="panel-card-title">外貌</div>`
    html += `<div style="font-size:13px;color:#ccc;line-height:1.6">${esc(data.appearance)}</div></div>`
  }

  // 已知情报（按类别分组）
  const discovered = data.discovered || []
  if (discovered.length) {
    const groups = {}
    for (const d of discovered) {
      const cat = d.category || '其他'
      if (!groups[cat]) groups[cat] = []
      groups[cat].push(d.fact)
    }
    html += `<div class="panel-card"><div class="panel-card-title">已知情报</div>`
    for (const [cat, facts] of Object.entries(groups)) {
      html += `<div style="font-size:11px;color:#e6b800;margin-top:8px;margin-bottom:4px">${esc(cat)}</div>`
      for (const f of facts) {
        html += `<div class="recap-item clue">${esc(f)}</div>`
      }
    }
    html += `</div>`
  }

  // 未解锁情报提示
  if (data.locked > 0) {
    html += `<div style="text-align:center;color:#555;font-size:12px;padding:8px">🔒 还有 ${data.locked} 条情报未解锁（提升信任度）</div>`
  }

  return html
}

function viewNPCDetail(shortName) {
  if (!ws) return
  ws.send(JSON.stringify({ type: 'view', text: '/npc ' + shortName }))
}

function moreCmd(cmd, label) {
  if (!ws) return
  // 使用 view 类型，DM 思考时也不阻塞
  ws.send(JSON.stringify({ type: 'view', text: cmd }))
}


function esc(str) {
  const d = document.createElement('div')
  d.textContent = str
  return d.innerHTML
}

// ─── DM 思考动画 ───
let thinkingTimer = null
function showThinking() {
  hideThinking()
  const container = document.getElementById('messages')
  const div = document.createElement('div')
  div.className = 'msg thinking'
  div.id = 'thinking-indicator'
  div.innerHTML = 'DM 正在思考<span class="dots"><span>·</span><span>·</span><span>·</span></span>'
  container.appendChild(div)
  container.scrollTop = container.scrollHeight
  thinkingTimer = setTimeout(() => {
    const el = document.getElementById('thinking-indicator')
    if (el) el.innerHTML = 'DM 还在思考，请稍候<span class="dots"><span>·</span><span>·</span><span>·</span></span>'
  }, 10000)
}

function hideThinking() {
  if (thinkingTimer) { clearTimeout(thinkingTimer); thinkingTimer = null }
  const el = document.getElementById('thinking-indicator')
  if (el) el.remove()
}

// ─── WebSocket 连接 ───
function connectWs(onOpen) {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:'
  const tokenParam = authToken ? `?token=${encodeURIComponent(authToken)}` : ''
  ws = new WebSocket(`${proto}//${location.host}${tokenParam}`)

  ws.onopen = () => { if (onOpen) onOpen(ws) }
  ws.onmessage = handleWsMessage
  ws.onclose = handleWsClose
  ws.onerror = () => {
    sending = false
    document.getElementById('send').disabled = false
  }
}

// ─── 游戏启动 ───
function startGame() {
  const name = document.getElementById('player-name').value.trim()
  if (!name || !selectedClass) return

  document.getElementById('create-screen').style.display = 'none'
  const gameScreen = document.getElementById('game-screen')
  gameScreen.style.display = 'flex'
  document.getElementById('tab-bar').style.display = 'flex'

  connectWs((ws) => {
    ws.send(JSON.stringify({ type: 'create', name, classId: selectedClass }))
  })
}

function handleWsMessage(e) {
  const msg = JSON.parse(e.data)
  const container = document.getElementById('messages')
  hideThinking()

  switch (msg.type) {
    case 'dm':
      if (!currentDmDiv) {
        currentDmDiv = document.createElement('div')
        currentDmDiv.className = 'msg dm'
        currentDmDiv._fullText = ''
        container.appendChild(currentDmDiv)
      }
      currentDmDiv.textContent += msg.text
      currentDmDiv._fullText += msg.text
      container.scrollTop = container.scrollHeight
      break

    case 'dm_end':
      if (currentDmDiv) {
        // 清理 markdown 符号和重复的选项文本
        let cleanText = currentDmDiv._fullText || currentDmDiv.textContent
        // 截断 SDK thinking-only 响应泄漏（streaming 分片可能绕过 engine 逐 chunk 过滤）
        const emptyIdx = cleanText.indexOf('(Empty response:')
        if (emptyIdx !== -1) cleanText = cleanText.substring(0, emptyIdx)
        cleanText = cleanText
          .replace(/\*\*([^*]+)\*\*/g, '$1')   // **bold** → bold
          .replace(/\*([^*]+)\*/g, '$1')         // *italic* → italic
          .replace(/^---+$/gm, '')               // --- 分隔线
          .replace(/^#{1,3}\s/gm, '')            // ### headers
          .replace(/\n{3,}/g, '\n\n')            // 多余空行
        currentDmDiv.textContent = cleanText
        currentDmDiv._fullText = cleanText
        saveMessage('dm', cleanText)
      }
      currentDmDiv = null
      currentThinkingEntry = null
      thinkingTurnCount++
      if (msg.pendingMonster) {
        combatMode = true
      } else {
        sending = false
        document.getElementById('send').disabled = false
        combatMode = !!msg.combat
        updateCombatPanel()
        if (!combatMode) showSceneActions(msg.actions)
      }
      break

    case 'combat_init':
      combatMode = true
      combatRound = msg.round || 1
      combatTargets = (msg.monsters || []).map(m => ({ id: m.id, name: m.name, hp: m.hp, maxHp: m.maxHp }))
      updateCombatPanel()
      if (msg.narrative) appendMsg(msg.narrative, 'combat-monster')
      break

    case 'combat_action_req':
      combatMode = true
      combatTargets = msg.targets || []
      combatSpells = msg.spells || []
      combatItems = msg.items || []
      sending = false
      document.getElementById('send').disabled = false
      setCombatButtonsEnabled(true)
      hideCombatSelector()
      updateCombatPanel()
      break

    case 'combat_narrative':
      appendMsg(msg.text, 'combat-narrative')
      break

    case 'combat_monster':
      // 怪物回合延迟显示（让玩家先看到自己的结果）
      setTimeout(() => {
        appendMsg('── 敌方回合 ──', 'combat-divider')
        setTimeout(() => appendMsg(msg.text, 'combat-monster'), 400)
      }, 800)
      break

    case 'combat_status':
      // 玩家回合也延迟显示 + 分隔线
      appendMsg('── 你的回合 ──', 'combat-divider')
      setTimeout(() => {
        appendMsg(msg.text, 'combat-player-result')
      }, 300)
      if (msg.ended) {
        combatMode = false
        combatTargets = []
        combatSpells = []
        combatItems = []
        sending = false
        document.getElementById('send').disabled = false
        document.getElementById('messages').querySelectorAll('.combat-portraits').forEach(el => el.remove())
        updateCombatPanel()
        // 战斗结束 → 切回场景 BGM（从当前会话状态推导）
        const savedSess = getSavedSession()
        if (savedSess) {
          const loc = savedSess.worldState?.currentLocation || 'dawnbreak-town'
          const sub = savedSess.worldState?.currentSubLocation
          const time = savedSess.worldState?.timeOfDay || 'morning'
          // 简单映射：根据位置选回场景音乐
          const bgmMap = { 'dawnbreak-town': time === 'night' ? 'town-night' : 'town-day', 'twilight-woods': 'forest', 'greyspine-mines': 'mines', 'shatterstone-wastes': 'wasteland' }
          const ambMap = { 'dawnbreak-town': time === 'night' ? 'crickets' : 'birds', 'twilight-woods': 'birds', 'greyspine-mines': 'drip', 'shatterstone-wastes': 'wind' }
          if (sub === 'shattered-shield-tavern') { switchAudio('tavern', 'fire') }
          else { switchAudio(bgmMap[loc] || 'town-day', ambMap[loc] || 'silence') }
        }
        showSceneActions()
      }
      break

    case 'panel': {
      // Server sends structured panel data → render in bottom sheet
      sending = false
      document.getElementById('send').disabled = false
      const panelId = msg.panel || 'info'
      const PANEL_TITLES = { status: '角色状态', quest: '任务', map: '地图', npc: '人物', inventory: '背包', shop: '商店', recap: '故事回顾', chapter: '章节进度', help: '帮助', saves: '存档列表', npc_detail: '人物详情' }
      const title = msg.title || PANEL_TITLES[panelId] || '信息'
      let html = ''
      switch (panelId) {
        case 'status':   html = renderStatusPanel(msg.data || {}); break
        case 'quest':    html = renderQuestPanel(msg.data || {}); break
        case 'map':      html = renderMapPanel(msg.data || {}); break
        case 'npc':      html = renderNPCListPanel(msg.data || {}); break
        case 'inventory': html = renderInventoryPanel(msg.data || {}); break
        case 'recap':    html = renderRecapPanel(msg.data || {}); break
        case 'shop':     html = renderShopPanel(msg.data || {}); break
        case 'chapter':  window._exploreData = (msg.data || {}).exploration || {}; html = renderChapterPanel(msg.data || {}); break
        case 'help': {
          const cmds = (msg.data || {}).commands || []
          html = '<div class="panel-card"><div class="panel-card-title">可用命令</div>'
          for (const c of cmds) html += `<div class="item-row"><span class="item-name">${esc(c.cmd)}</span><span class="item-detail">${esc(c.desc)}</span></div>`
          html += '</div>'
          break
        }
        case 'saves': {
          const saves = (msg.data || {}).saves || []
          html = '<div class="panel-card"><div class="panel-card-title">存档列表</div>'
          if (!saves.length) html += '<div style="color:#888;text-align:center;padding:20px;">暂无存档</div>'
          for (const s of saves) html += `<div class="item-row"><span class="item-name">${esc(typeof s === 'string' ? s : s.name || JSON.stringify(s))}</span></div>`
          html += '</div>'
          break
        }
        case 'npc_detail':  html = renderNPCDetailPanel(msg.data || {}); break
        default:         html = `<div class="panel-card"><div style="white-space:pre-wrap;color:#ccc">${esc(msg.text || JSON.stringify(msg.data, null, 2))}</div></div>`
      }
      openPanel(panelId, title, html)
      break
    }

    case 'system':
      // System command text output → render as panel fallback
      sending = false
      document.getElementById('send').disabled = false
      saveMessage('system', msg.text)
      openPanel('info', '系统', `<div class="panel-card"><div style="white-space:pre-wrap;color:#e6b800">${esc(msg.text)}</div></div>`)
      break

    case 'error':
      appendMsg('⚠️ ' + msg.text, 'error')
      sending = false
      document.getElementById('send').disabled = false
      break

    case 'prologue':
      appendMsg(msg.text, 'prologue')
      break

    case 'quest_progress':
      appendMsg(`⚔ ${msg.quest}: ${msg.text}`, 'system')
      break

    // ─── 死亡 ───
    case 'death':
      appendMsg(msg.text, 'error')
      clearSave()
      showGameOver({ reason: msg.text, canContinue: false })
      break

    // ─── 游戏终局 ───
    case 'game_over':
      showGameOver(msg)
      if (!msg.canContinue) clearSave()
      break

    // ─── NPC 立绘 ───
    case 'npc_speaking':
      showNPCPortrait(msg.npcName, msg.portrait)
      break

    // ─── 战斗怪物立绘 ───
    case 'combat_portraits':
      showCombatPortraits(msg.monsters || [])
      break

    // ─── NPC 角色卡 ───
    case 'npc_card':
      showNPCCard(msg)
      break

    // ─── 物品获取通知 ───
    case 'item_acquired':
      showItemNotification(msg.text)
      break

    // ─── 交易提案（DM 驱动的完整交易卡片） ───
    case 'trade_proposal':
      showTradeProposal(msg)
      break

    // ─── 音频 ───
    case 'audio':
      switchAudio(msg.bgm, msg.ambient)
      break

    // ─── DM 思考日志 ───
    case 'dm_thinking': {
      const thinkingPanel = document.getElementById('dm-thinking-panel')
      if (!thinkingPanel || thinkingPanel.style.display === 'none') break
      const thinkingContent = document.getElementById('thinking-content')
      if (!currentThinkingEntry) {
        currentThinkingEntry = document.createElement('div')
        currentThinkingEntry.className = 'thinking-entry'
        const label = document.createElement('div')
        label.className = 'turn-label'
        label.textContent = 'Turn ' + (thinkingTurnCount + 1)
        currentThinkingEntry.appendChild(label)
        thinkingContent.prepend(currentThinkingEntry)
      }
      currentThinkingEntry.appendChild(document.createTextNode(msg.text))
      break
    }

    // ─── 存档同步 ───
    case 'sync':
      saveToLocal(msg.session, msg.dossier)
      updateHUD(msg.session)
      // Update combat round from session if in combat
      if (msg.session?.combat?.active) {
        combatRound = msg.session.combat.round || 1
      }
      break

    case 'resumed':
      isResuming = false
      appendMsg('── 存档已恢复，继续冒险 ──', 'reconnect')
      {
        // 从服务端快照恢复完整视觉状态
        const snap = msg

        // 1. HUD
        if (snap.session) updateHUD(snap.session)

        // 2. 音频恢复
        if (snap.audio) {
          switchAudio(snap.audio.bgm, snap.audio.ambient)
        }

        // 3. 战斗状态恢复
        if (snap.combat) {
          combatMode = true
          combatRound = snap.combat.round || 1
          combatTargets = (snap.combat.monsters || []).map(m => ({ id: m.id, name: m.name, hp: m.hp, maxHp: m.maxHp }))
          combatSpells = (snap.combat.spells || []).map(s => ({ name: s.name, desc: s.description, remaining: s.remaining, max: s.usesPerRest, isCantrip: s.usesPerRest === 0 }))
          combatItems = (snap.combat.items || []).map(i => ({ name: i.name, desc: i.description }))
          updateCombatPanel()
          showCombatPortraits(snap.combat.monsters)
        } else {
          // 非战斗 → 恢复上一轮的选项按钮
          try {
            const savedActions = JSON.parse(localStorage.getItem('trpg_last_actions') || 'null')
            if (savedActions) showSceneActions(savedActions)
          } catch {}
          // HUD 兜底
          const s = getSavedSession()
          if (s) updateHUD(s)
        }
      }
      break

    case 'resume_failed':
      isResuming = false
      clearSave()
      appendMsg('存档恢复失败，请开始新游戏', 'error')
      // fallback: 回到角色创建
      document.getElementById('game-screen').style.display = 'none'
      document.getElementById('tab-bar').style.display = 'none'
      document.getElementById('create-screen').style.display = 'flex'
      break
  }
}

function handleWsClose() {
  sending = false
  document.getElementById('send').disabled = false
  // 只在游戏界面可见时重连（不是在角色创建/恢复界面）
  const gameVisible = document.getElementById('game-screen').style.display !== 'none'
  if (!gameVisible) return

  appendMsg('连接断开，5秒后重连...', 'reconnect')
  setTimeout(() => {
    if (ws?.readyState === WebSocket.CLOSED) {
      const session = getSavedSession()
      const dossier = getSavedDossier()
      connectWs(session ? (ws) => {
        isResuming = true
        ws.send(JSON.stringify({ type: 'resume', session, dossier }))
      } : null)
    }
  }, 5000)
}

function appendMsg(text, cls) {
  const div = document.createElement('div')
  div.className = 'msg ' + cls
  div.textContent = text
  if (cls === 'system') {
    div.addEventListener('click', () => div.classList.toggle('expanded'))
  }
  const container = document.getElementById('messages')
  container.appendChild(div)
  container.scrollTop = container.scrollHeight
}

// ─── 战斗面板 ───
function updateCombatPanel() {
  const panel = document.getElementById('combat-panel')
  const inputArea = document.getElementById('input-area')
  panel.classList.toggle('show', combatMode)
  inputArea.style.display = combatMode ? 'none' : ''
  if (combatMode) {
    const label = document.getElementById('combat-round-label')
    if (label) label.textContent = `第 ${combatRound} 轮 — 你的回合`
  }
}

function setCombatButtonsEnabled(enabled) {
  document.querySelectorAll('#combat-actions .combat-btn').forEach(btn => {
    btn.disabled = !enabled
  })
}

function hideCombatSelector() {
  const sel = document.getElementById('combat-selector')
  sel.classList.remove('show')
  sel.innerHTML = ''
}

function showCombatSelector(title, items, onSelect) {
  const sel = document.getElementById('combat-selector')
  sel.innerHTML = ''
  sel.classList.add('show')
  const titleEl = document.createElement('div')
  titleEl.className = 'combat-selector-title'
  titleEl.textContent = title
  sel.appendChild(titleEl)
  for (const item of items) {
    const row = document.createElement('div')
    row.className = 'combat-selector-item'
    row.innerHTML = `<span>${esc(item.label)}</span>${item.info ? `<span class="item-info">${esc(item.info)}</span>` : ''}`
    row.addEventListener('click', () => {
      hideCombatSelector()
      onSelect(item)
    })
    sel.appendChild(row)
  }
  // Cancel option
  const cancel = document.createElement('div')
  cancel.className = 'combat-selector-item'
  cancel.style.color = '#888'
  cancel.textContent = '取消'
  cancel.addEventListener('click', () => hideCombatSelector())
  sel.appendChild(cancel)
}

function sendCombatAction(action, targetId, spellId, itemId) {
  if (!ws || sending) return
  const labels = { attack: '⚔ 攻击', spell: '✨ 法术', item: '🧪 物品', flee: '🏃 逃跑', defend: '🛡 防御' }
  const target = targetId ? combatTargets.find(t => t.id === targetId) : null
  const spell = spellId ? combatSpells.find(s => s.name === spellId) : null
  const item = itemId ? combatItems.find(i => i.name === itemId) : null
  let desc = labels[action] || action
  if (target) desc += ` → ${target.name}`
  if (spell) desc += `（${spell.name}）`
  if (item) desc += `（${item.name}）`
  appendMsg(desc, 'player')
  ws.send(JSON.stringify({ type: 'combat_action', action, targetId, spellId, itemId }))
  sending = true
  setCombatButtonsEnabled(false)
  showThinking()
}

function combatAttack() {
  if (combatTargets.length === 0) return
  if (combatTargets.length === 1) {
    sendCombatAction('attack', combatTargets[0].id)
  } else {
    showCombatSelector('选择目标', combatTargets.map(t => ({
      label: t.name, info: `HP ${t.hp}/${t.maxHp}`, value: t.id,
    })), (item) => sendCombatAction('attack', item.value))
  }
}

function combatSpell() {
  if (combatSpells.length === 0) {
    appendMsg('没有可用的法术。', 'system')
    return
  }
  // Need target selection after spell selection for attack spells
  showCombatSelector('选择法术', combatSpells.map(s => ({
    label: s.name, info: s.isCantrip ? '戏法' : `${s.remaining}/${s.max}`, value: s.name, desc: s.desc,
  })), (spell) => {
    if (combatTargets.length === 1) {
      sendCombatAction('spell', combatTargets[0].id, spell.value)
    } else {
      showCombatSelector('选择目标', combatTargets.map(t => ({
        label: t.name, info: `HP ${t.hp}/${t.maxHp}`, value: t.id,
      })), (target) => sendCombatAction('spell', target.value, spell.value))
    }
  })
}

function combatItem() {
  if (combatItems.length === 0) {
    appendMsg('没有可用的物品。', 'system')
    return
  }
  showCombatSelector('选择物品', combatItems.map(i => ({
    label: i.name, info: i.desc || '', value: i.name,
  })), (item) => sendCombatAction('item', undefined, undefined, item.value))
}

function combatFlee() {
  sendCombatAction('flee')
}

function combatDefend() {
  sendCombatAction('defend')
}

// ─── 场景动作（DM 动态生成 + fallback） ───
function showSceneActions(actions) {
  const container = document.getElementById('messages')
  const existing = container.querySelector('.actions')
  if (existing) existing.remove()

  // 保存最新选项到 localStorage（刷新后恢复用）
  if (actions) {
    try { localStorage.setItem('trpg_last_actions', JSON.stringify(actions)) } catch {}
  }

  const details = actions?.details || []
  const suggestions = actions?.suggestions || ['四处看看', '继续前进']

  const div = document.createElement('div')
  div.className = 'actions'

  // 细节展开按钮（点击直接显示预写内容，无 API 调用）
  for (const d of details) {
    const btn = document.createElement('span')
    btn.className = 'action-btn detail'
    btn.textContent = '🔍 ' + d.label
    btn.onclick = () => {
      btn.classList.add('disabled')
      btn.style.opacity = '0.4'
      btn.onclick = null
      const expand = document.createElement('div')
      expand.className = 'detail-expand'
      expand.textContent = d.content
      // Insert after the actions bar
      div.parentNode.insertBefore(expand, div.nextSibling)
      container.scrollTop = container.scrollHeight
    }
    div.appendChild(btn)
  }

  // 推荐操作按钮（点击发送为玩家输入，触发新一轮）
  for (const s of suggestions) {
    const btn = document.createElement('span')
    btn.className = 'action-btn'
    btn.textContent = s
    btn.onclick = () => {
      div.remove()
      document.getElementById('input').value = s
      sendInput()
    }
    div.appendChild(btn)
  }

  container.appendChild(div)
  container.scrollTop = container.scrollHeight
}

// ─── NPC 角色卡弹窗 ───
function showNPCCard(data) {
  const overlay = document.getElementById('npc-card-overlay')
  const portraitEl = document.getElementById('npc-card-portrait')
  const nameEl = document.getElementById('npc-card-name')
  const titleEl = document.getElementById('npc-card-title')
  const factsEl = document.getElementById('npc-card-facts')

  nameEl.textContent = data.npcName || ''
  titleEl.textContent = data.title || ''

  // Portrait
  portraitEl.innerHTML = ''
  if (data.portrait) {
    const img = document.createElement('img')
    img.src = data.portrait
    img.alt = data.npcName || ''
    img.onerror = function() { this.style.display = 'none' }
    portraitEl.appendChild(img)
  }

  // Facts
  factsEl.innerHTML = ''
  const facts = data.firstFacts || []
  for (const fact of facts) {
    const li = document.createElement('li')
    li.textContent = fact
    factsEl.appendChild(li)
  }

  overlay.classList.add('open')
}

function closeNPCCard() {
  document.getElementById('npc-card-overlay').classList.remove('open')
}

// ─── 交易确认卡片 ───
function showItemNotification(text) {
  const container = document.getElementById('messages')
  const card = document.createElement('div')
  card.className = 'item-notification'
  card.innerHTML = `<span class="item-notif-icon">📦</span><span class="item-notif-text">${esc(text)}</span>`
  container.appendChild(card)
  container.scrollTop = container.scrollHeight
  // 5秒后淡出
  setTimeout(() => { card.style.opacity = '0.5' }, 5000)
}

function showTradeProposal(data) {
  const container = document.getElementById('messages')
  // 移除旧的交易卡片
  container.querySelectorAll('.trade-proposal-card').forEach(el => el.remove())

  const items = data.items || []
  // 从 items 自动计算总价（不信任 DM 传的 totalPrice，DM 可能传 0 或漏传）
  const totalPrice = items.reduce((sum, i) => sum + (i.price || 0) * (i.quantity || 1), 0) || data.totalPrice || 0
  const playerGold = getSavedSession()?.player?.gold ?? 0
  const canAfford = playerGold >= totalPrice

  let itemsHtml = ''
  for (const item of items) {
    const qty = item.quantity > 1 ? ` x${item.quantity}` : ''
    itemsHtml += `<div class="trade-item-row">
      <span>${esc(item.name)}${qty}</span>
      <span class="trade-item-price">${item.price * (item.quantity || 1)} 金</span>
    </div>`
  }

  const card = document.createElement('div')
  card.className = 'trade-proposal-card'
  // Store trade data on DOM (avoids JSON-in-HTML-attribute escaping bug)
  card._tradeData = { npc: data.npc || '商人', items, totalPrice }  // totalPrice 已从 items 自动计算
  const balanceAfter = playerGold - totalPrice
  const balanceClass = canAfford ? 'affordable' : 'unaffordable'
  card.innerHTML = `
    <div class="trade-proposal-header">🪙 交易 — ${esc(data.npc || '商人')}</div>
    <div class="trade-proposal-items">${itemsHtml}</div>
    <div class="trade-proposal-total">
      <span>总计</span>
      <span class="trade-item-price">${totalPrice} 金</span>
    </div>
    <div class="trade-proposal-balance ${balanceClass}">余额：${playerGold} → ${balanceAfter} 金</div>
    <div class="trade-proposal-btns">
      ${data.canBargain ? `<button class="trade-btn trade-btn-bargain" onclick="tradeBargain(this)">💬 砍价</button>` : ''}
      <button class="trade-btn trade-btn-confirm" ${canAfford ? '' : 'disabled'} onclick="tradeConfirm(this)">确认交易</button>
      <button class="trade-btn trade-btn-cancel" onclick="this.closest('.trade-proposal-card').remove()">取消</button>
    </div>`
  container.appendChild(card)
  container.scrollTop = container.scrollHeight
}

function tradeConfirm(btn) {
  const card = btn.closest('.trade-proposal-card')
  const { npc, items, totalPrice } = card._tradeData
  ws.send(JSON.stringify({ type: 'trade_execute', npc, items, totalPrice }))
  card.innerHTML = '<div style="color:#4caf50;font-size:13px;padding:8px">✅ 交易完成</div>'
}

function tradeBargain(btn) {
  btn.closest('.trade-proposal-card').remove()
  window._bargainMode = true
  const input = document.getElementById('input')
  input.value = ''
  input.placeholder = '砍价：你想怎么说？（发送后自动结束砍价模式）'
  input.focus()
}

// ─── NPC 立绘显示 ───
let lastPortraitTurn = 0
function showNPCPortrait(npcName, portraitSrc) {
  const container = document.getElementById('messages')

  // 新一轮对话开始时清除上一轮的立绘
  const turnNow = Date.now()
  if (turnNow - lastPortraitTurn > 3000) {
    container.querySelectorAll('.npc-portrait-bar').forEach(el => el.remove())
  }
  lastPortraitTurn = turnNow

  // 同一轮内同名 NPC 不重复显示
  const existing = container.querySelectorAll('.npc-portrait-bar')
  for (const el of existing) {
    if (el.dataset.npc === npcName) return
  }

  const bar = document.createElement('div')
  bar.className = 'npc-portrait-bar'
  bar.dataset.npc = npcName
  bar.innerHTML = `<img src="${esc(portraitSrc)}" alt="${esc(npcName)}" onerror="this.style.display='none'">` +
    `<div><div class="npc-speak-name">${esc(npcName)}</div>` +
    `<div class="npc-speak-hint">正在与你对话</div></div>`
  container.appendChild(bar)
  container.scrollTop = container.scrollHeight
}

// ─── 游戏终局弹窗 ───
function showGameOver(data) {
  const overlay = document.createElement('div')
  overlay.className = 'npc-card-overlay open'
  overlay.style.zIndex = '300'
  const canContinue = data.canContinue
  const hint = data.continueHint || ''
  overlay.innerHTML = `
    <div class="npc-card-popup" style="max-width:400px;text-align:center" onclick="event.stopPropagation()">
      <div style="padding:40px 24px 20px">
        <div style="font-size:48px;margin-bottom:16px">⚰️</div>
        <div style="font-size:20px;font-weight:bold;color:#f44336;margin-bottom:12px">游戏终局</div>
        <div style="font-size:14px;color:#ccc;line-height:1.6;margin-bottom:20px">${esc(data.reason)}</div>
        ${hint ? '<div style="font-size:12px;color:#888;margin-bottom:20px;font-style:italic">' + esc(hint) + '</div>' : ''}
        <div style="display:flex;flex-direction:column;gap:10px">
          <button onclick="location.reload()" style="background:#533483;color:white;border:none;padding:12px;border-radius:8px;font-size:15px;cursor:pointer">重新开始新冒险</button>
          ${canContinue ? '<button onclick="this.closest(\'.npc-card-overlay\').remove()" style="background:#0f3460;color:#888;border:1px solid #333;padding:10px;border-radius:8px;font-size:13px;cursor:pointer">继续坚持...</button>' : ''}
        </div>
      </div>
    </div>`
  document.body.appendChild(overlay)
}

// ─── 战斗怪物立绘 ───
function showCombatPortraits(monsters) {
  const container = document.getElementById('messages')

  // 移除旧的战斗面板
  container.querySelectorAll('.combat-portraits').forEach(el => el.remove())

  // 战斗结束（无怪物）→ 不显示
  if (!monsters.length) return

  const panel = document.createElement('div')
  panel.className = 'combat-portraits'

  for (const m of monsters) {
    const dead = m.hp <= 0
    const pct = m.maxHp > 0 ? Math.round(m.hp / m.maxHp * 100) : 0
    const card = document.createElement('div')
    card.className = 'combat-monster-card' + (dead ? ' dead' : '')
    card.innerHTML = (m.portrait
      ? `<img src="${esc(m.portrait)}" alt="${esc(m.name)}" onerror="this.style.display='none'">`
      : `<div style="width:48px;height:48px;background:#1a0a0a;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px">⚔</div>`) +
      `<div class="monster-name">${esc(m.name)}</div>` +
      `<div class="monster-hp">${dead ? '击杀' : m.hp + '/' + m.maxHp}</div>` +
      (dead ? '' : `<div class="hp-bar-mini"><div class="hp-fill" style="width:${pct}%"></div></div>`)
    panel.appendChild(card)
  }

  container.appendChild(panel)
  container.scrollTop = container.scrollHeight
}

// ─── 常驻 HUD ───
function updateHUD(session) {
  if (!session?.player) return
  const hud = document.getElementById('player-hud')
  if (hud) hud.style.display = ''
  const p = session.player
  const hpEl = document.getElementById('hud-hp')
  const goldEl = document.getElementById('hud-gold')
  const locEl = document.getElementById('hud-location')
  if (hpEl) {
    const hpPct = p.maxHp > 0 ? p.hp / p.maxHp : 1
    hpEl.style.color = hpPct > 0.5 ? '#4caf50' : hpPct > 0.25 ? '#ff9800' : '#f44336'
    hpEl.textContent = `❤️ ${p.hp}/${p.maxHp}`
  }
  if (goldEl) goldEl.textContent = `💰 ${p.gold}`
  if (locEl) {
    const locNames = { 'dawnbreak-town':'破晓镇','twilight-woods':'暮色森林','greyspine-mines':'灰脊矿道','shatterstone-wastes':'碎石荒原' }
    locEl.textContent = `📍 ${locNames[session.worldState?.currentLocation] ?? '未知'}`
  }
}

// ─── 音频播放器 ───
const AUDIO_BASE = 'audio/'
let bgmAudio = null
let ambientAudio = null
let currentBgm = ''
let currentAmbient = ''
let audioUnlocked = false
let pendingBgm = ''
let pendingAmbient = ''

function unlockAudio() {
  if (audioUnlocked) return
  bgmAudio = new Audio()
  bgmAudio.loop = true
  bgmAudio.volume = 0.3
  ambientAudio = new Audio()
  ambientAudio.loop = true
  ambientAudio.volume = 0.2
  audioUnlocked = true
  // 播放解锁前缓存的音频
  if (pendingBgm || pendingAmbient) {
    switchAudio(pendingBgm, pendingAmbient)
    pendingBgm = ''
    pendingAmbient = ''
  }
}

function switchAudio(bgm, ambient) {
  // 未解锁时缓存，等用户点击后播放
  if (!audioUnlocked) {
    if (bgm) pendingBgm = bgm
    if (ambient !== undefined) pendingAmbient = ambient
    return
  }
  if (bgm && bgm !== currentBgm) {
    currentBgm = bgm
    bgmAudio.src = AUDIO_BASE + bgm + '.mp3'
    bgmAudio.play().catch(() => {})
  }
  if (ambient !== undefined && ambient !== currentAmbient) {
    currentAmbient = ambient
    if (!ambient || ambient === 'silence') {
      ambientAudio.pause()
      ambientAudio.src = ''
    } else {
      ambientAudio.src = AUDIO_BASE + 'amb-' + ambient + '.mp3'
      ambientAudio.play().catch(() => {})
    }
  }
}

// 用户首次交互解锁音频（iOS/Chrome 要求）
document.addEventListener('click', unlockAudio, { once: true })
document.addEventListener('touchstart', unlockAudio, { once: true })

// ─── 输入 ───
function sendInput() {
  const input = document.getElementById('input')
  const text = input.value.trim()
  if (!text || !ws || sending) return

  appendMsg('🗡️ ' + text, 'player')
  saveMessage('player', text)

  if (window._bargainMode) {
    window._bargainMode = false
    input.placeholder = ''
    ws.send(JSON.stringify({ type: 'bargain', text }))
  } else {
    ws.send(JSON.stringify({ type: 'input', text }))
  }

  input.value = ''
  input.style.height = 'auto'
  sending = true
  document.getElementById('send').disabled = true
  showThinking()
}

// textarea 自动调整高度
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto'
  this.style.height = Math.min(this.scrollHeight, 120) + 'px'
})

// Enter 发送，Shift+Enter 换行，输入法确认时不发送（isComposing）
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault()
    if (document.getElementById('create-screen').style.display !== 'none') {
      startGame()
    } else {
      sendInput()
    }
  }
})
</script>
